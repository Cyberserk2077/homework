<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Nike Air Mag</title>
		<link rel="stylesheet" href="./css/main.css" />
		<link
			rel="shortcut icon"
			type="image/x-icon"
			href="./icons/nike-favicon.ico"
		/>
		<script src="./scripts/main.js" type="module" defer></script>
	</head>
	<body class="page__body">
		<header class="header">
			<div class="header__inner container">
				<a class="header__logo logo" href="/">
					<img
						class="logo__image"
						src="./images/logo.svg"
						alt="Логотип Nike"
						width="50"
						height="20"
						loading="lazy"
					/>
				</a>
				<nav
					class="header__menu menu"
					id="header__menu"
					aria-label="Главное меню"
				>
					<ul class="menu__list">
						<li class="menu__item">
							<a class="menu__link" href="#air-mag" lang="en">Air Mag</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#sizes">Размеры</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#characteristics">Характеристики</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#top-models">Други ТОП модели</a>
						</li>
					</ul>
				</nav>
				<div class="header__order">
					<a class="header__order-link" href="/">Сделать заказ</a>
					<div class="header__order-actions">
						<button
							class="header__order-button"
							title="Поиск"
							aria-label="Поиск"
						>
							<svg class="header__order-icon" width="24" height="24">
								<use href="./icons/sprite.svg#search"></use>
							</svg>
						</button>
						<button
							class="header__order-button"
							title="Корзина"
							aria-label="Корзина"
						>
							<svg class="header__order-icon" width="24" height="24">
								<use href="./icons/sprite.svg#cart"></use>
							</svg>
						</button>
						<button
							class="header__burger-button burger-button"
							aria-label="Открыть меню"
							aria-expanded="false"
							aria-controls="header__menu"
						>
							<svg width="24" height="24">
								<use
									class="burger-button__burger-menu"
									href="./icons/sprite.svg#burger-menu"
								></use>
								<use
									class="burger-button__burger-cross"
									href="./icons/sprite.svg#burger-cross"
								></use>
							</svg>
						</button>
					</div>
				</div>
			</div>
		</header>
	</body>
</html>
