<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Variables and types</title>
  <link rel="stylesheet" href="./css/main.css">
  <script src="./scripts/main.js" type="module"></script>
</head>
<body>
<div class="grid-bg"></div>
<div class="scene">
  <div class="arrow-area">
    <div class="key-hint">
      <div class="key-row">
        <span>Windows / Linux:</span>
        <span class="key">F12</span>
      </div>
      <div class="key-row">
        <span>Mac:</span>
        <span class="key">⌘</span>
        <span class="key">⌥</span>
        <span class="key">J</span>
      </div>
    </div>

    <svg class="arrow" width="80" height="40" viewBox="0 0 80 40" fill="none">
      <line x1="0" y1="20" x2="62" y2="20" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <polyline points="50,8 68,20 50,32" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>

    <div class="console-box">
      <div class="label">вкладка</div>
      <div class="name">Console</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="step-row">
    <div class="step"><div class="step-num">1</div>Открой DevTools</div>
    <div class="step"><div class="step-num">2</div>Перейди на Console</div>
    <div class="step"><div class="step-num">3</div>Смотри ДЗ:)</div>
  </div>
</div>
</body>
</html>
